<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>aw-watcher-llm</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <div class="page">
      <header class="toolbar">
        <div class="titlebar">
          <p class="eyebrow">ActivityWatch Custom Visualization</p>
          <h1>LLM Session Lanes</h1>
        </div>

        <div class="controls">
          <label>
            <span>Host</span>
            <input id="host-input" type="text" value="" placeholder="Loading hostname...">
          </label>
          <label>
            <span>Date</span>
            <input id="date-input" type="date">
          </label>
          <label>
            <span>View</span>
            <select id="view-mode-select">
              <option value="day">Single Day</option>
              <option value="avg24h">Rolling Window</option>
            </select>
          </label>
          <label id="days-control">
            <span>Days</span>
            <input id="days-input" type="number" min="2" max="90" step="1" value="7">
          </label>
          <label>
            <span>Source</span>
            <select id="source-select">
              <option value="all">All Sources</option>
              <option value="opencode">OpenCode</option>
              <option value="qoder">Qoder</option>
              <option value="codex">Codex</option>
              <option value="claudecode">Claude Code</option>
            </select>
          </label>
          <a class="secondary-action" href="./standalone.html" target="_blank" rel="noreferrer">Open Standalone</a>
          <button id="load-button" type="button">Reload</button>
        </div>
      </header>

      <section class="summary-strip" id="summary"></section>

      <section class="overview-grid">
        <article class="overview-panel">
          <div class="chart-header">
            <div>
              <h2>Source Breakdown</h2>
              <p id="source-caption"></p>
            </div>
          </div>
          <div id="source-breakdown" class="metric-breakdown"></div>
        </article>

        <article class="overview-panel">
          <div class="chart-header">
            <div>
              <h2>Model Breakdown</h2>
              <p id="model-caption"></p>
            </div>
          </div>
          <div id="model-breakdown" class="metric-breakdown"></div>
        </article>
      </section>

      <section class="chart-frame">
        <div class="chart-header chart-header-focus">
          <div>
            <h2 id="focus-title">Source Activity</h2>
            <p id="focus-caption"></p>
          </div>
        </div>
        <div id="focus-ribbon" class="focus-ribbon"></div>

        <div class="chart-header chart-header-lanes">
          <div>
            <h2 id="lanes-title">Root Lanes</h2>
            <p id="lanes-caption"></p>
          </div>
        </div>
        <div class="lanes-shell">
          <div id="lanes-root" class="lanes-root"></div>
        </div>
      </section>

      <section class="inspector-strip">
        <div class="inspector-header">
          <h2>Inspector</h2>
        </div>
        <div id="inspector" class="inspector empty">Select a lane to inspect it.</div>
      </section>

      <details class="status-panel">
        <summary>Status</summary>
        <div class="status-body">
          <pre id="status-log" class="status-log"></pre>
        </div>
      </details>
    </div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
